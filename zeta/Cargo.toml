[package]
name = "zeta"
version = "0.1.0"
authors = ["Mikkel Kroman <mk@maero.dk>"]
edition = "2018"

[dependencies]
clap = "2.33"
env_logger = { version = "0.7", default-features = false, features = ["termcolor", "atty", "humantime"] }
failure = "0.1"
tokio = { version = "1.0", features = ["full"] }
zeta-core = { path = "../zeta-core", version = "*" }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.8"
