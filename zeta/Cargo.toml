[package]
name = "zeta"
version = "0.1.0"
authors = ["Mikkel Kroman <mk@maero.dk>"]
edition = "2018"

[dependencies]
log = "0.4"
clap = "2.33"
tokio = { version = "1.0", features = ["full"] }
zeta-core = { path = "../zeta-core", version = "*" }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.8"
thiserror = "1.0"
anyhow = "1.0"

[dependencies.pretty_env_logger]
version = "0.4"

